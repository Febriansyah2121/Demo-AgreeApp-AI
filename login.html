<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AgreeApp AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: #1B5E20;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin: 0 auto 12px;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 800;
            color: #1B5E20;
        }

        .logo-sub {
            font-size: 12px;
            color: #757575;
            margin-top: 4px;
        }

        .tab-container {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            background: #f3f3f1;
            padding: 4px;
            border-radius: 99px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            border: none;
            background: transparent;
            font-weight: 600;
            cursor: pointer;
            border-radius: 99px;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .tab.active {
            background: #1B5E20;
            color: white;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #1e2330;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #adadad;
            border-radius: 12px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
            outline: none;
        }

        .form-input:focus {
            border-color: #2E7D32;
        }

        .role-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .role-btn {
            flex: 1;
            padding: 10px;
            border: 1.5px solid #adadad;
            background: white;
            border-radius: 99px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .role-btn.active {
            background: #1B5E20;
            color: white;
            border-color: #1B5E20;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #1B5E20;
            color: white;
            border: none;
            border-radius: 99px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }

        .btn-login:hover {
            background: #2E7D32;
            transform: translateY(-2px);
        }

        .demo-note {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #757575;
            background: #f3f3f1;
            padding: 10px;
            border-radius: 10px;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #757575;
            text-decoration: none;
            font-size: 13px;
        }

        .back-link a:hover {
            color: #1B5E20;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">🌿</div>
            <div class="logo-text">AgreeApp AI</div>
            <div class="logo-sub">Smart Agriculture Platform</div>
        </div>

        <div class="tab-container">
            <button class="tab active" id="loginTab" onclick="switchTab('login')">Login</button>
            <button class="tab" id="registerTab" onclick="switchTab('register')">Register</button>
        </div>

        <!-- Login Form -->
        <div id="loginForm">
            <div class="form-group">
                <label class="form-label">Email / Username</label>
                <input type="text" class="form-input" id="loginEmail" placeholder="Enter your email" value="dwi@gmail.com">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" id="loginPassword" placeholder="Enter your password" value="123456">
            </div>
            <div class="role-selector">
                <button class="role-btn active" data-role="F" onclick="selectRole('F', this)">🌾 Farmer</button>
                <button class="role-btn" data-role="D" onclick="selectRole('D', this)">🚚 Distributor</button>
                <button class="role-btn" data-role="C" onclick="selectRole('C', this)">🛒 Consumer</button>
            </div>
            <button class="btn-login" onclick="handleLogin()">Sign In →</button>
        </div>

        <!-- Register Form -->
        <div id="registerForm" style="display: none;">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-input" id="regName" placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" class="form-input" id="regEmail" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" id="regPassword" placeholder="Create a password">
            </div>
            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-input" id="regConfirmPassword" placeholder="Confirm your password">
            </div>
            <div class="role-selector">
                <button class="role-btn active" data-role="F" onclick="selectRoleReg('F', this)">🌾 Farmer</button>
                <button class="role-btn" data-role="D" onclick="selectRoleReg('D', this)">🚚 Distributor</button>
                <button class="role-btn" data-role="C" onclick="selectRoleReg('C', this)">🛒 Consumer</button>
            </div>
            <button class="btn-login" onclick="handleRegister()">Create Account →</button>
        </div>

        <div class="demo-note">
            🔐 Demo Mode — Use any email & password<br>
            Click Sign In to explore the app
        </div>

        <div class="back-link">
            <a href="index.html">← Back to Home</a>
        </div>
    </div>

    <script>
        let selectedRole = 'F';
        let selectedRoleReg = 'F';

        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');

            if (tab === 'login') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                loginTab.classList.remove('active');
                registerTab.classList.add('active');
            }
        }

        function selectRole(role, btn) {
            selectedRole = role;
            const container = btn.parentElement;
            container.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function selectRoleReg(role, btn) {
            selectedRoleReg = role;
            const container = btn.parentElement;
            container.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email) {
                alert('Please enter email');
                return;
            }

            // Ambil nama dari email (sebelum @)
            let userName = email.split('@')[0];
            // Kapitalisasi huruf pertama
            userName = userName.charAt(0).toUpperCase() + userName.slice(1);
            
            // Simpan ke localStorage
            localStorage.setItem('userEmail', email);
            localStorage.setItem('userRole', selectedRole);
            localStorage.setItem('userName', userName);
            
            console.log('Saved to localStorage:', { email, role: selectedRole, userName });
            
            // Redirect ke app
            window.location.href = 'app.html';
        }

        function handleRegister() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;

            if (!name || !email || !password) {
                alert('Please fill all fields');
                return;
            }

            if (password !== confirmPassword) {
                alert('Passwords do not match');
                return;
            }

            localStorage.setItem('userEmail', email);
            localStorage.setItem('userRole', selectedRoleReg);
            localStorage.setItem('userName', name);

            window.location.href = 'app.html';
        }
    </script>
</body>
</html>
