<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>AgreeApp AI – Smart Agriculture Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --green-dark: #1B5E20;
    --green-mid: #2E7D32;
    --green-light: #4CAF50;
    --green-pale: #E8F5E9;
    --orange: #FF9800;
    --orange-light: #FFF3E0;
    --bg: #f3f3f1;
    --card: #ffffff;
    --text-dark: #1e2330;
    --text-gray: #757575;
    --border: #adadad;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --shadow-lg: 0 8px 32px rgba(27,94,32,0.13);
    --radius: 16px;
    --radius-btn: 99px;
    --font: 'Plus Jakarta Sans', 'Arial', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: #e8e8e5;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 0;
  }

  .app-shell {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    background: var(--bg);
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(0,0,0,0.18);
  }

  .screen { display: none; flex-direction: column; min-height: 100vh; padding-bottom: 72px; }
  .screen.active { display: flex; }

  .scroll-area { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 24px; }
  .scroll-area::-webkit-scrollbar { width: 0; }

  .app-header {
    background: #fff;
    padding: 16px 16px 12px;
    border-bottom: 1px solid #f0f0ee;
    position: sticky; top: 0; z-index: 10;
  }

  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-greeting { font-size: 13px; color: var(--text-gray); }
  .header-name { font-size: 18px; font-weight: 800; color: var(--text-dark); }

  .avatar {
    width: 42px; height: 42px;
    background: var(--green-dark);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 800;
    color: #fff;
  }

  .logout-btn {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    padding: 8px;
    border-radius: 50%;
    transition: 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logout-btn:hover { background: #f0f0f0; }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
    margin-bottom: 12px;
  }

  .card-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-gray);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 10px;
  }

  .hero-card {
    background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 60%, #43A047 100%);
    border-radius: var(--radius);
    padding: 20px;
    color: #fff;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow-lg);
  }

  .hero-value { font-size: 36px; font-weight: 800; letter-spacing: -1px; }
  .hero-sub { font-size: 12px; opacity: 0.7; margin-top: 4px; }

  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .stat-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 14px;
    box-shadow: var(--shadow);
  }
  .stat-icon { font-size: 22px; margin-bottom: 8px; }
  .stat-val { font-size: 20px; font-weight: 800; color: var(--text-dark); }
  .stat-lbl { font-size: 11px; color: var(--text-gray); font-weight: 500; }

  .progress-wrap { margin-top: 10px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-gray); margin-bottom: 6px; }
  .progress-bar { height: 8px; background: #eee; border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 99px; background: var(--green-mid); }
  .progress-fill.orange { background: var(--orange); }

  .bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 80px; margin-top: 10px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .bar { width: 100%; border-radius: 6px 6px 0 0; background: var(--green-pale); }
  .bar.active { background: var(--green-mid); }
  .bar-lbl { font-size: 10px; color: var(--text-gray); }

  .shipment-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 0;
    border-bottom: 1px solid #f5f5f5;
  }
  .shipment-item:last-child { border-bottom: none; }
  .shipment-route { font-size: 14px; font-weight: 700; color: var(--text-dark); }
  .shipment-meta { font-size: 11px; color: var(--text-gray); margin-top: 2px; }

  .badge { display: inline-block; padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 700; }
  .badge-green { background: var(--green-pale); color: var(--green-dark); }
  .badge-blue { background: #E3F2FD; color: #1565C0; }
  .badge-orange { background: var(--orange-light); color: #E65100; }

  .scanner-box {
    border: 2.5px dashed var(--orange);
    border-radius: var(--radius);
    padding: 32px 16px;
    text-align: center;
    margin-bottom: 16px;
    background: var(--orange-light);
    cursor: pointer;
  }
  .scanner-icon { font-size: 52px; margin-bottom: 12px; }
  .btn-scan {
    background: var(--orange);
    color: #fff;
    border: none;
    border-radius: var(--radius-btn);
    padding: 12px 28px;
    font-weight: 700;
    cursor: pointer;
  }
  .scan-result { display: none; }
  .scan-result.show { display: block; }

  .product-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .product-img { width: 52px; height: 52px; border-radius: 14px; background: linear-gradient(135deg, #C8E6C9, #A5D6A7); display: flex; align-items: center; justify-content: center; font-size: 26px; }
  .product-name { font-size: 16px; font-weight: 800; }

  .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f5f5f5; font-size: 13px; }
  .info-key { color: var(--text-gray); }
  .info-val { color: var(--text-dark); font-weight: 600; }

  .price-row { display: flex; gap: 10px; margin-top: 14px; }
  .price-box { flex: 1; background: var(--green-pale); border-radius: 12px; padding: 12px; text-align: center; }
  .price-box.orange { background: var(--orange-light); }
  .price-val { font-size: 15px; font-weight: 800; color: var(--green-dark); margin-top: 4px; }

  .blockchain-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, #1a237e, #283593);
    color: #fff;
    border-radius: 12px;
    padding: 12px 14px;
    margin-top: 14px;
  }

  .forecast-scroll { display: flex; gap: 10px; overflow-x: auto; margin-bottom: 12px; }
  .forecast-card {
    min-width: 80px;
    background: var(--card);
    border-radius: 14px;
    padding: 12px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .forecast-card.today { background: var(--green-mid); color: #fff; }

  .stock-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .stock-name { font-size: 14px; font-weight: 700; }

  .bottom-nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    max-width: 480px;
    background: #fff;
    border-top: 1px solid #f0f0ee;
    display: flex;
    z-index: 100;
  }

  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 4px 8px;
    cursor: pointer;
    gap: 4px;
    background: none;
    border: none;
  }
  .nav-icon { font-size: 22px; }
  .nav-label { font-size: 10px; color: var(--text-gray); font-weight: 600; }
  .nav-item.active .nav-label { color: var(--green-mid); }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .screen.active .card, .screen.active .hero-card { animation: fadeIn 0.35s ease; }

  @media (min-width: 481px) { .app-shell { margin: 0 auto; } }
</style>
</head>
<body>

<div class="app-shell">

  <!-- ==================== FARMER DASHBOARD ==================== -->
  <div class="screen active" id="dashboard-screen">
    <div class="app-header">
      <div class="header-row">
        <div>
          <div class="header-greeting" id="greetingText">Memuat...</div>
          <div class="header-name" id="userNameDisplay">Memuat...</div>
        </div>
        <div style="display: flex; gap: 12px; align-items: center;">
          <div class="avatar" id="userAvatar">🌾</div>
          <button class="logout-btn" onclick="logout()" title="Logout">🚪</button>
        </div>
      </div>
    </div>
    <div class="scroll-area" id="farmerDashboard">
      <!-- Konten FARMER akan diisi JavaScript -->
    </div>
  </div>

  <!-- ==================== DISTRIBUTOR DASHBOARD ==================== -->
  <div class="screen" id="distributor-screen">
    <div class="app-header">
      <div class="header-row">
        <div>
          <div class="header-greeting" id="greetingTextDist">Memuat...</div>
          <div class="header-name" id="userNameDisplayDist">Memuat...</div>
        </div>
        <div style="display: flex; gap: 12px; align-items: center;">
          <div class="avatar" style="background: var(--orange);" id="userAvatarDist">🚚</div>
          <button class="logout-btn" onclick="logout()" title="Logout">🚪</button>
        </div>
      </div>
    </div>
    <div class="scroll-area" id="distributorDashboard">
      <!-- Konten DISTRIBUTOR akan diisi JavaScript -->
    </div>
  </div>

  <!-- ==================== CONSUMER DASHBOARD ==================== -->
  <div class="screen" id="consumer-screen">
    <div class="app-header">
      <div class="header-row">
        <div>
          <div class="header-greeting" id="greetingTextCon">Memuat...</div>
          <div class="header-name" id="userNameDisplayCon">Memuat...</div>
        </div>
        <div style="display: flex; gap: 12px; align-items: center;">
          <div class="avatar" style="background: var(--green-light);" id="userAvatarCon">🛒</div>
          <button class="logout-btn" onclick="logout()" title="Logout">🚪</button>
        </div>
      </div>
    </div>
    <div class="scroll-area" id="consumerDashboard">
      <!-- Konten CONSUMER akan diisi JavaScript -->
    </div>
  </div>

  <!-- ==================== BOTTOM NAV ==================== -->
  <div class="bottom-nav" id="bottomNav">
    <button class="nav-item active" onclick="showScreenByRole('home')"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></button>
    <button class="nav-item" onclick="showScreenByRole('features')"><span class="nav-icon">⚙️</span><span class="nav-label">Features</span></button>
    <button class="nav-item" onclick="showScreenByRole('profile')"><span class="nav-icon">👤</span><span class="nav-label">Profile</span></button>
  </div>
</div>

<script>
// ==================== GET TIME GREETING ====================
function getTimeGreeting() {
  const now = new Date();
  const hours = now.getHours();
  if (hours >= 5 && hours < 11) return "🌅 Selamat Pagi";
  if (hours >= 11 && hours < 15) return "☀️ Selamat Siang";
  if (hours >= 15 && hours < 18) return "🌤️ Selamat Sore";
  return "🌙 Selamat Malam";
}

// ==================== AMBIL DATA DARI LOCALSTORAGE ====================
let userEmail = localStorage.getItem('userEmail');
let userRole = localStorage.getItem('userRole');
let userName = localStorage.getItem('userName');

if (!userEmail || !userRole) {
  window.location.href = 'login.html';
}

let displayName = userName;
if (!displayName && userEmail) {
  displayName = userEmail.split('@')[0];
  displayName = displayName.charAt(0).toUpperCase() + displayName.slice(1);
}
if (!displayName) displayName = 'User';

const greeting = getTimeGreeting();

// ==================== RENDER DASHBOARD BERDASARKAN ROLE ====================
function renderDashboard() {
  if (userRole === 'F') {
    // TAMPILAN FARMER
    document.getElementById('greetingText').textContent = greeting + ',';
    document.getElementById('userNameDisplay').innerHTML = `🌾 ${displayName}`;
    document.getElementById('userAvatar').textContent = 'F';
    
    document.getElementById('farmerDashboard').innerHTML = `
      <div class="hero-card">
        <div class="hero-value">24.7 <span style="font-size:16px;">Tons</span></div>
        <div class="hero-sub">↑ 12% vs last season · Top 10% in Jember</div>
      </div>
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-icon">🌦️</div><div class="stat-val">31°C</div><div class="stat-lbl">Sunny · Jember</div></div>
        <div class="stat-card"><div class="stat-icon">💧</div><div class="stat-val">70%</div><div class="stat-lbl">Humidity</div></div>
      </div>
      <div class="card">
        <div class="card-title">🌱 Soil Fertility</div>
        <div class="progress-wrap"><div class="progress-label"><span>Overall Health</span><span>85%</span></div><div class="progress-bar"><div class="progress-fill" style="width:85%"></div></div></div>
        <div style="margin-top:10px; font-size:12px; color:var(--text-gray)">N: High · P: Medium · K: High</div>
      </div>
      <div class="card">
        <div class="card-title">📦 Current Stock</div>
        <div class="stock-header"><span class="stock-name">🌾 Rice (IR64)</span><span>1,200 kg</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:60%"></div></div>
        <div class="stock-header" style="margin-top:12px"><span class="stock-name">🌽 Corn</span><span>320 kg</span></div>
        <div class="progress-bar"><div class="progress-fill orange" style="width:32%"></div></div>
      </div>
      <div class="card">
        <div class="card-title">📊 Harvest Chart</div>
        <div class="bar-chart">
          <div class="bar-col"><div class="bar" style="height:42px"></div><div class="bar-lbl">Dec</div></div>
          <div class="bar-col"><div class="bar" style="height:56px"></div><div class="bar-lbl">Jan</div></div>
          <div class="bar-col"><div class="bar" style="height:48px"></div><div class="bar-lbl">Feb</div></div>
          <div class="bar-col"><div class="bar" style="height:66px"></div><div class="bar-lbl">Mar</div></div>
          <div class="bar-col"><div class="bar" style="height:76px"></div><div class="bar-lbl">Apr</div></div>
          <div class="bar-col"><div class="bar active" style="height:72px"></div><div class="bar-lbl">May</div></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">🤖 AI Recommendation</div>
        <p style="font-size:13px;">Optimal planting window: <strong>June 2-8</strong>. Rainfall 45mm expected. Ideal for IR64 rice.</p>
      </div>
    `;
  } 
  else if (userRole === 'D') {
    // TAMPILAN DISTRIBUTOR
    document.getElementById('greetingTextDist').textContent = greeting + ',';
    document.getElementById('userNameDisplayDist').innerHTML = `🚚 ${displayName}`;
    document.getElementById('userAvatarDist').textContent = 'D';
    
    document.getElementById('distributorDashboard').innerHTML = `
      <div class="hero-card" style="background: linear-gradient(135deg, #1565C0, #1976D2);">
        <div class="hero-value">18.4 <span style="font-size:16px;">Tons</span></div>
        <div class="hero-sub">Total Volume Shipped This Month</div>
      </div>
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-icon">🚛</div><div class="stat-val">8</div><div class="stat-lbl">Active Shipments</div></div>
        <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-val">23</div><div class="stat-lbl">Completed</div></div>
        <div class="stat-card"><div class="stat-icon">⏰</div><div class="stat-val">91.3%</div><div class="stat-lbl">On-Time Delivery</div></div>
        <div class="stat-card"><div class="stat-icon">⚠️</div><div class="stat-val">2</div><div class="stat-lbl">Delayed</div></div>
      </div>
      <div class="card">
        <div class="card-title">🚚 Active Shipments</div>
        <div class="shipment-item"><div><div class="shipment-route">Jember → Surabaya</div><div class="shipment-meta">Rice 800kg · ETA: Today 18:00</div></div><span class="badge badge-blue">In Transit</span></div>
        <div class="shipment-item"><div><div class="shipment-route">Malang → Gresik</div><div class="shipment-meta">Corn 450kg · Arrived</div></div><span class="badge badge-green">Delivered</span></div>
        <div class="shipment-item"><div><div class="shipment-route">Bondowoso → Sidoarjo</div><div class="shipment-meta">Mixed 600kg · Delayed 3hrs</div></div><span class="badge badge-orange">Delayed</span></div>
      </div>
      <div class="card">
        <div class="card-title">📈 Performance Summary</div>
        <div class="info-row"><span class="info-key">Total Volume</span><span class="info-val">18.4 Tons</span></div>
        <div class="info-row"><span class="info-key">Active Partners</span><span class="info-val">7 Distributors</span></div>
        <div class="info-row"><span class="info-key">Avg. Delivery Time</span><span class="info-val">4.2 hours</span></div>
      </div>
    `;
  } 
  else if (userRole === 'C') {
    // TAMPILAN CONSUMER
    document.getElementById('greetingTextCon').textContent = greeting + ',';
    document.getElementById('userNameDisplayCon').innerHTML = `🛒 ${displayName}`;
    document.getElementById('userAvatarCon').textContent = 'C';
    
    document.getElementById('consumerDashboard').innerHTML = `
      <div class="hero-card" style="background: linear-gradient(135deg, var(--orange), #F57C00);">
        <div class="hero-value">Fresh from Farm</div>
        <div class="hero-sub">Scan QR to know your food's journey</div>
      </div>
      <div class="scanner-box" onclick="simulateScan()">
        <div class="scanner-icon">📱</div>
        <div class="info-key" style="margin-bottom:12px;">Tap to scan QR code</div>
        <button class="btn-scan">📷 Scan QR Code</button>
      </div>
      <div class="scan-result" id="scanResult">
        <div class="card">
          <div class="product-header"><div class="product-img">🌾</div><div><div class="product-name">Premium IR64 Rice</div><div class="info-key">Verified · Organic</div></div></div>
          <div class="info-row"><span class="info-key">Origin</span><span class="info-val">Jember, East Java</span></div>
          <div class="info-row"><span class="info-key">Harvest Date</span><span class="info-val">May 10, 2025</span></div>
          <div class="info-row"><span class="info-key">Farmer</span><span class="info-val">Budi Santoso</span></div>
        </div>
        <div class="card">
          <div class="card-title">💰 Price Transparency</div>
          <div class="price-row"><div class="price-box"><div class="info-key">Farmer Price</div><div class="price-val">Rp 9,800/kg</div></div><div class="price-box orange"><div class="info-key">Consumer Price</div><div class="price-val">Rp 13,200/kg</div></div></div>
          <div class="blockchain-badge"><span>🔗</span><span><strong>Blockchain Verified</strong><br>Hash: 0x4a7f…c92e</span></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">🛍️ Recent Purchases</div>
        <div class="info-row"><span>🌾 IR64 Rice</span><span>May 15, 2025</span></div>
        <div class="info-row"><span>🌽 Sweet Corn</span><span>May 12, 2025</span></div>
        <div class="info-row"><span>🥬 Organic Vegetables</span><span>May 10, 2025</span></div>
      </div>
    `;
  }
}

// ==================== NAVIGASI ====================
function showScreenByRole(section) {
  if (userRole === 'F') {
    if (section === 'home') {
      document.getElementById('dashboard-screen').classList.add('active');
    } else {
      document.getElementById('dashboard-screen').classList.remove('active');
      // Fitur lain bisa ditambahkan
    }
  } else if (userRole === 'D') {
    if (section === 'home') {
      document.getElementById('distributor-screen').classList.add('active');
    } else {
      document.getElementById('distributor-screen').classList.remove('active');
    }
  } else if (userRole === 'C') {
    if (section === 'home') {
      document.getElementById('consumer-screen').classList.add('active');
    } else {
      document.getElementById('consumer-screen').classList.remove('active');
    }
  }
  
  // Update active nav
  document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
  event.currentTarget.classList.add('active');
}

// ==================== QR SCAN SIMULATION ====================
function simulateScan() {
  const result = document.getElementById('scanResult');
  if (result) {
    result.classList.add('show');
    result.scrollIntoView({ behavior: 'smooth' });
  }
}

// ==================== LOGOUT ====================
function logout() {
  localStorage.removeItem('userEmail');
  localStorage.removeItem('userRole');
  localStorage.removeItem('userName');
  window.location.href = 'login.html';
}

// ==================== INITIAL RENDER ====================
renderDashboard();

// Tampilkan screen sesuai role
document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
if (userRole === 'F') document.getElementById('dashboard-screen').classList.add('active');
else if (userRole === 'D') document.getElementById('distributor-screen').classList.add('active');
else if (userRole === 'C') document.getElementById('consumer-screen').classList.add('active');

// Update bottom nav visibility
document.getElementById('bottomNav').style.display = 'flex';
</script>
</body>
</html>
